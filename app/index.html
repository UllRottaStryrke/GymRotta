<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e293b" />
  <title>StrengthApp</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-ink: #0c1220;
      --ok: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1 1 auto; }
    main {
      padding: 14px;
      padding-bottom: 120px;
      max-width: 680px;
      margin: 0 auto;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 16px;
    }
    .empty h2 { color: var(--text); margin: 0 0 8px 0; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--primary);
      color: var(--primary-ink);
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .btn.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    select, input[type="number"], input[type="text"] {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      min-height: 44px;
      width: 100%;
    }
    select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 32px; }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin: 18px 0 8px 0;
    }
    .exercise {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .ex-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .ex-name { font-size: 17px; font-weight: 600; line-height: 1.3; }
    .tier {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tier.t1 { background: #7f1d1d; color: #fecaca; border-color: #991b1b; }
    .tier.t2 { background: #713f12; color: #fde68a; border-color: #854d0e; }
    .tier.t3 { background: #1e3a8a; color: #bfdbfe; border-color: #1d4ed8; }
    .ex-plan {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .ex-notes {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--border);
    }
    .sets {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .set-row {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 44px;
      gap: 6px;
      align-items: center;
    }
    .set-row .set-num {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .set-row input {
      padding: 8px 10px;
      font-size: 15px;
      text-align: center;
      min-height: 40px;
    }
    .set-row .done {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 0;
      min-height: 40px;
      font-size: 18px;
      cursor: pointer;
    }
    .set-row .done.done-on {
      background: var(--ok);
      color: #052e16;
      border-color: var(--ok);
    }
    .sets-header {
      display: grid;
      grid-template-columns: 36px 1fr 1fr 44px;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 2px;
    }
    .sets-header.paired,
    .set-row.paired {
      grid-template-columns: 36px 72px 1fr 1fr 44px;
    }
    .set-row.paired .part-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
    .set-row.part-heavy .part-label { color: #fca5a5; }
    .set-row.part-backoff .part-label { color: #93c5fd; }
    .set-row.part-backoff {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
    }
    .set-row.part-backoff:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .rating-bar {
      display: flex;
      gap: 0;
      margin-top: 14px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .rating-btn {
      flex: 1;
      padding: 9px 4px;
      font-size: 13px;
      font-weight: 600;
      border: 0;
      background: var(--surface-2);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-height: 42px;
      border-right: 1px solid var(--border);
    }
    .rating-btn:last-child { border-right: 0; }
    .rating-btn.active-easy   { background: #1d4ed8; color: #bfdbfe; }
    .rating-btn.active-ok     { background: #166534; color: #bbf7d0; }
    .rating-btn.active-hard   { background: #991b1b; color: #fecaca; }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    footer > * { flex: 1; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 110px;
      transform: translateX(-50%);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .meta-line {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    @media (min-width: 520px) {
      .set-row, .sets-header { grid-template-columns: 44px 1fr 1fr 56px; }
      .sets-header.paired, .set-row.paired { grid-template-columns: 44px 88px 1fr 1fr 56px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">StrengthApp</h1>
    <div class="row">
      <select id="weekSelect" aria-label="Uke"></select>
      <select id="daySelect" aria-label="Dag"></select>
    </div>
    <div class="status" id="statusLine">Ingen program lastet.</div>
  </header>

  <main id="main">
    <div class="empty" id="emptyState">
      <h2>Kom i gang</h2>
      <p>Velg <code>strength_program.json</code> fra Google Drive eller telefonens lagring for å laste programmet.</p>
      <button class="btn" id="loadBtn">Velg programfil</button>
      <input type="file" id="fileInput" accept="application/json,.json" hidden />
      <p class="status">Dataene lagres lokalt på telefonen etter første innlasting.</p>
    </div>
  </main>

  <footer id="footer" hidden>
    <button class="btn secondary" id="reloadBtn">Bytt fil</button>
    <button class="btn" id="exportBtn">Eksporter</button>
    <input type="file" id="fileInput2" accept="application/json,.json" hidden />
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "strengthapp:program:v1";
      const STATE_KEY = "strengthapp:state:v1";

      const $ = (id) => document.getElementById(id);
      const titleEl = $("title");
      const weekSelect = $("weekSelect");
      const daySelect = $("daySelect");
      const statusLine = $("statusLine");
      const main = $("main");
      const emptyState = $("emptyState");
      const footer = $("footer");
      const loadBtn = $("loadBtn");
      const reloadBtn = $("reloadBtn");
      const exportBtn = $("exportBtn");
      const fileInput = $("fileInput");
      const fileInput2 = $("fileInput2");
      const toastEl = $("toast");

      let program = null; // parsed JSON (mutable)
      let uiState = { weekIdx: 0, dayIdx: 0 };
      let toastTimer = null;

      const WEEKDAY_TO_SESSION_HINT = {
        1: "Upper A",   // Monday
        2: "Lower A",   // Tuesday
        3: "Upper B",   // Wednesday
        4: "Lower B",   // Thursday
        5: "Upper C"    // Friday
      };

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1800);
      }

      function saveProgram() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(program));
        } catch (e) {
          toast("Lagring feilet: " + e.message);
        }
      }

      function saveState() {
        try {
          localStorage.setItem(STATE_KEY, JSON.stringify(uiState));
        } catch (e) { /* ignore */ }
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return false;
          program = JSON.parse(raw);
          const rawState = localStorage.getItem(STATE_KEY);
          if (rawState) uiState = JSON.parse(rawState);
          return true;
        } catch (e) {
          return false;
        }
      }

      function validateProgram(obj) {
        if (!obj || typeof obj !== "object") return "Ikke et gyldig JSON-objekt.";
        if (!Array.isArray(obj.weeks)) return "Mangler 'weeks'-array.";
        if (obj.weeks.length === 0) return "'weeks' er tom.";
        for (const w of obj.weeks) {
          if (!Array.isArray(w.days)) return "En uke mangler 'days'.";
        }
        return null;
      }

      function pickDefaultDay() {
        // Try to match weekday to session
        const today = new Date();
        const dow = today.getDay(); // 0 Sun, 1 Mon, ... 5 Fri
        const hint = WEEKDAY_TO_SESSION_HINT[dow];
        if (!hint) return 0;
        const week = program.weeks[uiState.weekIdx] || program.weeks[0];
        if (!week) return 0;
        const idx = week.days.findIndex((d) => d && d.session === hint);
        return idx >= 0 ? idx : 0;
      }

      function fmtLoadKg(load, loadNote) {
        if (load === null || load === undefined) {
          return loadNote ? loadNote : "–";
        }
        if (typeof load === "number") {
          return load + " kg" + (loadNote ? " (" + loadNote + ")" : "");
        }
        if (Array.isArray(load)) {
          return load.join(" → ") + " kg";
        }
        if (typeof load === "object") {
          const parts = [];
          if ("heavy" in load) parts.push("Tung: " + load.heavy + " kg");
          if ("backoff" in load) parts.push("Back-off: " + load.backoff + " kg");
          if (parts.length === 0) {
            for (const k in load) parts.push(k + ": " + load[k]);
          }
          return parts.join(" / ");
        }
        return String(load);
      }

      function defaultLoadForLogging(load) {
        if (typeof load === "number") return load;
        if (Array.isArray(load) && load.length) return load[load.length - 1];
        if (load && typeof load === "object") {
          if ("backoff" in load) return load.backoff;
          if ("heavy" in load) return load.heavy;
        }
        return "";
      }

      function isPairedExercise(ex) {
        return (
          ex.load_kg &&
          typeof ex.load_kg === "object" &&
          !Array.isArray(ex.load_kg) &&
          ("heavy" in ex.load_kg || "backoff" in ex.load_kg)
        );
      }

      // Best-effort parse of planned reps from reps_note for paired exercises,
      // e.g. "3 rounds of: 2 reps × 90.0 kg → 15 reps × 60.0 kg"
      function parsePairedReps(ex) {
        const defaults = { heavy: null, backoff: null };
        const note = ex.reps_note || "";
        const matches = note.match(/(\d+)\s*reps/gi);
        if (matches && matches.length >= 2) {
          const nums = matches.map((m) => parseInt(m, 10)).filter((n) => !isNaN(n));
          if (nums.length >= 2) {
            defaults.heavy = nums[0];
            defaults.backoff = nums[1];
          }
        }
        return defaults;
      }

      function ensureActualSets(ex) {
        const planned = typeof ex.sets === "number" && ex.sets > 0 ? ex.sets : 1;
        if (!Array.isArray(ex.actual_sets)) ex.actual_sets = [];

        if (isPairedExercise(ex)) {
          const plannedReps = parsePairedReps(ex);
          const heavyKg = ex.load_kg && "heavy" in ex.load_kg ? ex.load_kg.heavy : "";
          const backoffKg = ex.load_kg && "backoff" in ex.load_kg ? ex.load_kg.backoff : "";
          while (ex.actual_sets.length < planned) {
            ex.actual_sets.push({
              heavy: {
                reps: plannedReps.heavy,
                load_kg: heavyKg,
                completed: false,
                completed_at: null
              },
              backoff: {
                reps: plannedReps.backoff,
                load_kg: backoffKg,
                completed: false,
                completed_at: null
              }
            });
          }
          // Guard against older entries missing a sub-part, and remove stale
          // simple-row fields if an earlier version wrote them here.
          for (const s of ex.actual_sets) {
            if (!s.heavy) s.heavy = { reps: plannedReps.heavy, load_kg: heavyKg, completed: false, completed_at: null };
            if (!s.backoff) s.backoff = { reps: plannedReps.backoff, load_kg: backoffKg, completed: false, completed_at: null };
            delete s.reps;
            delete s.load_kg;
            delete s.completed;
            delete s.completed_at;
          }
          return;
        }

        while (ex.actual_sets.length < planned) {
          ex.actual_sets.push({
            reps: typeof ex.reps === "number" ? ex.reps : null,
            load_kg: defaultLoadForLogging(ex.load_kg),
            completed: false,
            completed_at: null
          });
        }
      }

      function populateWeekSelect() {
        weekSelect.innerHTML = "";
        program.weeks.forEach((w, i) => {
          const opt = document.createElement("option");
          opt.value = String(i);
          const deload = w.is_deload ? " (deload)" : "";
          opt.textContent = "Uke " + (w.week_number != null ? w.week_number : i + 1) + deload;
          weekSelect.appendChild(opt);
        });
        weekSelect.value = String(uiState.weekIdx);
      }

      function populateDaySelect() {
        daySelect.innerHTML = "";
        const week = program.weeks[uiState.weekIdx];
        if (!week) return;
        week.days.forEach((d, i) => {
          const opt = document.createElement("option");
          opt.value = String(i);
          const parts = [];
          if (d.day) parts.push(d.day);
          if (d.session) parts.push(d.session);
          opt.textContent = parts.join(" – ") || ("Dag " + (i + 1));
          daySelect.appendChild(opt);
        });
        daySelect.value = String(uiState.dayIdx);
      }

      function renderEmptyState() {
        emptyState.hidden = false;
        footer.hidden = true;
        statusLine.textContent = "Ingen program lastet.";
        // Clear any previous rendered day content
        Array.from(main.children).forEach((c) => { if (c.id !== "emptyState") c.remove(); });
      }

      function renderExercise(ex, section) {
        ensureActualSets(ex);

        const card = document.createElement("div");
        card.className = "exercise";

        const head = document.createElement("div");
        head.className = "ex-header";

        const name = document.createElement("div");
        name.className = "ex-name";
        name.textContent = ex.name || "(uten navn)";
        head.appendChild(name);

        if (ex.tier) {
          const tier = document.createElement("span");
          tier.className = "tier " + (String(ex.tier).toLowerCase());
          tier.textContent = ex.tier;
          head.appendChild(tier);
        }
        card.appendChild(head);

        const plan = document.createElement("div");
        plan.className = "ex-plan";
        const planParts = [];
        if (typeof ex.sets === "number") planParts.push(ex.sets + " sett");
        if (ex.reps != null) planParts.push("× " + ex.reps + " reps");
        else if (ex.reps_note) planParts.push("× " + ex.reps_note);
        planParts.push("@ " + fmtLoadKg(ex.load_kg, ex.load_note));
        if (ex.rpe != null) {
          if (typeof ex.rpe === "object") {
            const rp = [];
            for (const k in ex.rpe) rp.push(k + " RPE " + ex.rpe[k]);
            planParts.push(rp.join(" / "));
          } else {
            planParts.push("RPE " + ex.rpe);
          }
        }
        plan.textContent = planParts.join("  ·  ");
        card.appendChild(plan);

        if (ex.notes) {
          const notes = document.createElement("div");
          notes.className = "ex-notes";
          notes.textContent = ex.notes;
          card.appendChild(notes);
        }

        const header = document.createElement("div");
        header.className = "sets-header";
        if (isPairedExercise(ex)) {
          header.innerHTML = "<div>#</div><div>Del</div><div>Reps</div><div>Vekt (kg)</div><div></div>";
          header.classList.add("paired");
        } else {
          header.innerHTML = "<div>#</div><div>Reps</div><div>Vekt (kg)</div><div></div>";
        }
        card.appendChild(header);

        const wrap = document.createElement("div");
        wrap.className = "sets";

        if (isPairedExercise(ex)) {
          ex.actual_sets.forEach((set, i) => {
            wrap.appendChild(makePairedRow(ex, set, i, "heavy", "Tung", i + 1));
            wrap.appendChild(makePairedRow(ex, set, i, "backoff", "Back-off", ""));
          });
        } else {
          ex.actual_sets.forEach((set, i) => {
            wrap.appendChild(makeSimpleRow(ex, set, i));
          });
        }
        card.appendChild(wrap);
        card.appendChild(renderRatingBar(ex));

        return card;
      }

      const RATINGS = [
        { key: "too_easy", label: "For lett", cls: "active-easy" },
        { key: "ok",       label: "Passelig", cls: "active-ok"   },
        { key: "too_hard", label: "For hard", cls: "active-hard"  }
      ];

      function renderRatingBar(ex) {
        const bar = document.createElement("div");
        bar.className = "rating-bar";
        const btns = [];
        RATINGS.forEach(({ key, label, cls }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "rating-btn" + (ex.session_rating === key ? " " + cls : "");
          btn.textContent = label;
          btn.addEventListener("click", () => {
            // Toggle off if already selected, otherwise select
            ex.session_rating = ex.session_rating === key ? null : key;
            btns.forEach((b, i) => {
              b.className = "rating-btn" + (ex.session_rating === RATINGS[i].key ? " " + RATINGS[i].cls : "");
            });
            saveProgram();
          });
          btns.push(btn);
          bar.appendChild(btn);
        });
        return bar;
      }

      function makeSimpleRow(ex, set, i) {
        const row = document.createElement("div");
        row.className = "set-row";

        const num = document.createElement("div");
        num.className = "set-num";
        num.textContent = String(i + 1);
        row.appendChild(num);

        const repsInput = document.createElement("input");
        repsInput.type = "number";
        repsInput.inputMode = "numeric";
        repsInput.min = "0";
        repsInput.step = "1";
        repsInput.value = set.reps != null && set.reps !== "" ? String(set.reps) : "";
        repsInput.placeholder = typeof ex.reps === "number" ? String(ex.reps) : "";
        repsInput.addEventListener("input", () => {
          const v = repsInput.value.trim();
          set.reps = v === "" ? null : Number(v);
          saveProgram();
        });
        row.appendChild(repsInput);

        const loadInput = document.createElement("input");
        loadInput.type = "number";
        loadInput.inputMode = "decimal";
        loadInput.min = "0";
        loadInput.step = "0.25";
        loadInput.value = set.load_kg != null && set.load_kg !== "" ? String(set.load_kg) : "";
        const phLoad = defaultLoadForLogging(ex.load_kg);
        loadInput.placeholder = phLoad !== "" ? String(phLoad) : "";
        loadInput.addEventListener("input", () => {
          const v = loadInput.value.trim();
          set.load_kg = v === "" ? null : Number(v);
          saveProgram();
        });
        row.appendChild(loadInput);

        const done = document.createElement("button");
        done.type = "button";
        done.className = "done" + (set.completed ? " done-on" : "");
        done.textContent = set.completed ? "✓" : "○";
        done.setAttribute("aria-label", "Marker sett " + (i + 1) + " fullført");
        done.addEventListener("click", () => {
          set.completed = !set.completed;
          set.completed_at = set.completed ? new Date().toISOString() : null;
          done.className = "done" + (set.completed ? " done-on" : "");
          done.textContent = set.completed ? "✓" : "○";
          saveProgram();
        });
        row.appendChild(done);

        return row;
      }

      function makePairedRow(ex, set, setIdx, partKey, partLabel, numLabel) {
        const part = set[partKey];
        const row = document.createElement("div");
        row.className = "set-row paired part-" + partKey;

        const num = document.createElement("div");
        num.className = "set-num";
        num.textContent = String(numLabel);
        row.appendChild(num);

        const label = document.createElement("div");
        label.className = "part-label";
        label.textContent = partLabel;
        row.appendChild(label);

        const repsInput = document.createElement("input");
        repsInput.type = "number";
        repsInput.inputMode = "numeric";
        repsInput.min = "0";
        repsInput.step = "1";
        repsInput.value = part.reps != null && part.reps !== "" ? String(part.reps) : "";
        const plannedReps = parsePairedReps(ex);
        repsInput.placeholder = plannedReps[partKey] != null ? String(plannedReps[partKey]) : "";
        repsInput.addEventListener("input", () => {
          const v = repsInput.value.trim();
          part.reps = v === "" ? null : Number(v);
          saveProgram();
        });
        row.appendChild(repsInput);

        const loadInput = document.createElement("input");
        loadInput.type = "number";
        loadInput.inputMode = "decimal";
        loadInput.min = "0";
        loadInput.step = "0.25";
        loadInput.value = part.load_kg != null && part.load_kg !== "" ? String(part.load_kg) : "";
        const defaultKg = ex.load_kg && partKey in ex.load_kg ? ex.load_kg[partKey] : "";
        loadInput.placeholder = defaultKg !== "" ? String(defaultKg) : "";
        loadInput.addEventListener("input", () => {
          const v = loadInput.value.trim();
          part.load_kg = v === "" ? null : Number(v);
          saveProgram();
        });
        row.appendChild(loadInput);

        const done = document.createElement("button");
        done.type = "button";
        done.className = "done" + (part.completed ? " done-on" : "");
        done.textContent = part.completed ? "✓" : "○";
        done.setAttribute("aria-label", "Marker sett " + (setIdx + 1) + " " + partLabel + " fullført");
        done.addEventListener("click", () => {
          part.completed = !part.completed;
          part.completed_at = part.completed ? new Date().toISOString() : null;
          done.className = "done" + (part.completed ? " done-on" : "");
          done.textContent = part.completed ? "✓" : "○";
          saveProgram();
        });
        row.appendChild(done);

        return row;
      }

      function renderDay() {
        // Remove any previous day rendering
        Array.from(main.children).forEach((c) => { if (c.id !== "emptyState") c.remove(); });
        emptyState.hidden = true;
        footer.hidden = false;

        const week = program.weeks[uiState.weekIdx];
        const day = week && week.days[uiState.dayIdx];
        if (!day) {
          const msg = document.createElement("div");
          msg.className = "empty";
          msg.textContent = "Ingen data for valgt dag.";
          main.appendChild(msg);
          return;
        }

        const progName = (program.metadata && program.metadata.program && program.metadata.program.name) || "Program";
        titleEl.textContent = progName;
        const bits = [];
        bits.push("Uke " + (week.week_number != null ? week.week_number : uiState.weekIdx + 1));
        if (day.day) bits.push(day.day);
        if (day.session) bits.push(day.session);
        if (day.focus) bits.push("Fokus: " + day.focus);
        if (week.is_deload) bits.push("DELOAD");
        statusLine.textContent = bits.join("  ·  ");

        const sections = [
          { key: "warmup", label: "Oppvarming" },
          { key: "main", label: "Hovedøvelser" },
          { key: "accessories", label: "Tillegg" }
        ];

        for (const s of sections) {
          const list = Array.isArray(day[s.key]) ? day[s.key] : [];
          if (list.length === 0) continue;
          const h = document.createElement("div");
          h.className = "section-title";
          h.textContent = s.label;
          main.appendChild(h);
          for (const ex of list) {
            main.appendChild(renderExercise(ex, s.key));
          }
        }
      }

      function refresh() {
        if (!program) { renderEmptyState(); return; }
        // Clamp indices
        if (uiState.weekIdx >= program.weeks.length) uiState.weekIdx = 0;
        const week = program.weeks[uiState.weekIdx];
        if (!week || uiState.dayIdx >= week.days.length) uiState.dayIdx = 0;

        populateWeekSelect();
        populateDaySelect();
        renderDay();
        saveState();
      }

      function loadProgramFromFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const obj = JSON.parse(reader.result);
            const err = validateProgram(obj);
            if (err) { toast("Ugyldig fil: " + err); return; }
            program = obj;
            // Try to pick a sensible default day based on weekday
            uiState.weekIdx = 0;
            uiState.dayIdx = pickDefaultDay();
            saveProgram();
            saveState();
            refresh();
            toast("Program lastet (" + program.weeks.length + " uker)");
          } catch (e) {
            toast("Kunne ikke lese JSON: " + e.message);
          }
        };
        reader.onerror = () => toast("Klarte ikke lese filen.");
        reader.readAsText(file);
      }

      function exportProgram() {
        if (!program) { toast("Ingen data å eksportere."); return; }
        const now = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const stamp = now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + "_" + pad(now.getHours()) + pad(now.getMinutes());
        const filename = "strength_program_logged_" + stamp + ".json";
        const text = JSON.stringify(program, null, 2);
        const blob = new Blob([text], { type: "application/json" });

        // Prefer native share (lets user pick Google Drive directly)
        if (navigator.canShare && window.File) {
          try {
            const file = new File([blob], filename, { type: "application/json" });
            if (navigator.canShare({ files: [file] })) {
              navigator.share({ files: [file], title: "StrengthApp-logg", text: "Loggede treningsdata" })
                .then(() => toast("Delt."))
                .catch((err) => {
                  if (err && err.name !== "AbortError") {
                    fallbackDownload(blob, filename);
                  }
                });
              return;
            }
          } catch (_) { /* fallthrough */ }
        }
        fallbackDownload(blob, filename);
      }

      function fallbackDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
        toast("Lagret " + filename);
      }

      // Wire up UI
      loadBtn.addEventListener("click", () => fileInput.click());
      reloadBtn.addEventListener("click", () => fileInput2.click());
      fileInput.addEventListener("change", (e) => {
        const f = e.target.files && e.target.files[0];
        if (f) loadProgramFromFile(f);
        fileInput.value = "";
      });
      fileInput2.addEventListener("change", (e) => {
        const f = e.target.files && e.target.files[0];
        if (f) loadProgramFromFile(f);
        fileInput2.value = "";
      });
      exportBtn.addEventListener("click", exportProgram);
      weekSelect.addEventListener("change", () => {
        uiState.weekIdx = Number(weekSelect.value);
        uiState.dayIdx = 0;
        refresh();
      });
      daySelect.addEventListener("change", () => {
        uiState.dayIdx = Number(daySelect.value);
        renderDay();
        saveState();
      });

      // Service worker for offline
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => { /* ignore */ });
        });
      }

      // Boot
      if (loadFromStorage()) {
        refresh();
      } else {
        renderEmptyState();
      }
    })();
  </script>
</body>
</html>
